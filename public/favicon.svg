<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="TrueSelf">
  <!-- 与 Navbar 品牌标一致：外圈圆 + 内圈反色圆（w-8 h-8 / w-4 h-4） -->
  <style>
    .outer {
      fill: #000000;
    }
    .inner {
      fill: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      .outer {
        fill: #ffffff;
      }
      .inner {
        fill: #000000;
      }
    }
  </style>
  <circle class="outer" cx="16" cy="16" r="16"/>
  <circle class="inner" cx="16" cy="16" r="8"/>
</svg>
